server {
    listen 80;
    server_name smartmenu.work www.smartmenu.work;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name smartmenu.work www.smartmenu.work;

    ssl_certificate /etc/letsencrypt/live/smartmenu.work/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/smartmenu.work/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Gzip compression
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;
    gzip_vary on;

    location /static/ {
        alias /code/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /media/ {
        alias /code/media/;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    resolver 127.0.0.11 valid=10s;

    location /ws/ {
        proxy_pass http://asgi:9000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://web:8000;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
