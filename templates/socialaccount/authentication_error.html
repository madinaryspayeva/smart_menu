{% extends 'base.html' %}
{% load i18n %}

{% block title %}Ошибка входа | Smart Menu{% endblock %}

{% block content %}
<div class="min-h-screen bg-gradient-to-r from-pastel-pink to-amber-300 py-12">
    <div class="container mx-auto px-4">
        <div class="max-w-md mx-auto bg-white rounded-lg shadow-lg p-8 text-center">
            <h1 class="text-3xl font-bebas-neue text-red-600 mb-4">
                Ошибка аутентификации
            </h1>
            
            <p class="text-gray-600 mb-6">
                Произошла ошибка при входе через Google. Пожалуйста, попробуйте снова.
            </p>
            
            <a href="{% url 'account_login' %}" class="inline-block bg-coral-red text-white px-6 py-2 rounded hover:opacity-80 transition">
                Вернуться ко входу
            </a>
        </div>
    </div>
</div>
{% endblock %}
