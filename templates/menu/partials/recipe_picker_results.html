{% for recipe in recipes %}
<div class="flex items-center gap-3 p-3 rounded-2xl border cursor-pointer transition-all mb-2"
     style="border-color:var(--color-border);background:var(--color-bg-soft)"
     onmouseover="this.style.borderColor='var(--color-primary)';this.style.background='rgba(255,136,17,0.06)'"
     onmouseout="this.style.borderColor='var(--color-border)';this.style.background='var(--color-bg-soft)'"
     onclick="selectRecipeForMenu('{{ recipe.id }}', '{{ recipe.name|escapejs }}', {{ recipe.servings }}, '{% if recipe.image %}{{ recipe.image.url }}{% endif %}')">

  {% if recipe.image %}
    <img src="{{ recipe.image.url }}" class="w-12 h-12 rounded-xl object-cover flex-shrink-0">
  {% else %}
    <div class="w-12 h-12 rounded-xl flex items-center justify-center flex-shrink-0"
         style="background:rgba(255,136,17,0.1)">
      <i class="fa-solid fa-utensils" style="color:var(--color-primary)"></i>
    </div>
  {% endif %}

  <div class="flex-1 min-w-0">
    <p class="text-sm font-medium truncate" style="color:var(--color-text)">{{ recipe.name }}</p>
    <p class="text-xs" style="color:var(--color-text-muted)">
      {{ recipe.get_meal_type_display|default:"Без категории" }} · {{ recipe.servings }} порц.
    </p>
  </div>

  <div class="flex-shrink-0 w-8 h-8 rounded-full flex items-center justify-center"
       style="background:rgba(255,136,17,0.12)">
    <i class="fa-solid fa-plus text-xs" style="color:var(--color-primary)"></i>
  </div>
</div>
{% empty %}
<div class="text-center py-6" style="color:var(--color-text-muted)">
  <i class="fa-solid fa-search text-2xl mb-2" style="display:block;opacity:0.4"></i>
  <p class="text-sm">Рецепты не найдены</p>
</div>
{% endfor %}
