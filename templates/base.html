{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'output.css' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@200..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <title>SmartMenu</title>
</head>
<body class="bg-pastel-yellow font-oswald min-h-screen">
<header class="bg-gradient-to-r from-pastel-pink to-amber-300 text-white py-5 shadow-lg">
    <div class="container mx-auto px-4 flex justify-between items-center">
        <a href="{% url 'recipe:list' %}" class="flex items-center space-x-2 group">
            <span class="text-3xl group-hover:scale-110 transition-transform duration-200">🍽</span>
            <h1 class="text-4xl font-bebas-neue text-coral-red group-hover:text-coral-red/80 transition-colors">Smart Menu</h1>
        </a>
        
        <nav class="hidden md:block">
            <ul class="flex space-x-6 items-center">
                <li><a href="{% url 'recipe:list' %}" class="hover:bg-pastel-pink/30 px-3 py-2 rounded transition">Главная</a></li>
                <li><a href="#" class="hover:bg-pastel-pink/30 px-3 py-2 rounded transition">Меню</a></li>
                {% if user.is_authenticated %}
                <li>
                    <form method="post" action="{% url 'account_logout' %}" class="inline-flex items-center m-0 p-0">
                        {% csrf_token %}
                        <button class="hover:bg-pastel-pink/30 px-3 py-2 rounded transition" type="submit">Выйти</button>
                    </form>
                </li>
                {% endif %}
            </ul>
        </nav>
        <button class="md:hidden text-2xl">☰</button>
    </div>
</header>
    <main class="container mx-auto px-4 py-10">
        <div class="flex justify-center items-start ">
            {% block content %}
            {% endblock content %}
        </div>
    </main>
   <footer class="bg-gradient-to-r from-pastel-pink to-amber-300 text-white py-6 mt-auto">
    <div class="container mx-auto px-4">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <!-- Логотип -->
            <div class="flex items-center space-x-2">
                <span class="text-xl">🍽</span>
                <span class="text-xl font-bebas-neue text-coral-red">Smart Menu</span>
            </div>
            
            <!-- Ссылки -->
            <div class="flex flex-col space-y-1.5">
                <a href="#" class="text-sm hover:text-coral-red transition">О нас</a>
                <a href="#" class="text-sm hover:text-coral-red transition">Контакты</a>
                <a href="#" class="text-sm hover:text-coral-red transition">Политика конфиденциальности</a>
            </div>
        </div>
        
        <div class="text-center mt-6 pt-3 border-t border-white/20">
            <p class="text-xs">© 2026 Smart Menu. Все права защищены.</p>
        </div>
    </div>
</footer>

<script src="https://unpkg.com/htmx.org@1.9.10"></script>
</body>
</html>
