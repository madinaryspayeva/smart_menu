<!-- Модальное окно удаления продукта -->
<div style="background-color: var(--color-bg-card); border-radius: var(--radius-block); border: 1px solid var(--color-border); padding: 2rem; margin: 0 1rem; max-width: 420px; width: 100%; box-shadow: 0 20px 40px rgba(0,0,0,0.15); animation: scaleIn 0.3s ease;">
    <div style="text-align: center;">
        <form method="POST" action="{% url 'product:delete' product.pk %}">
            {% csrf_token %}

            <div style="width: 64px; height: 64px; background: rgba(255, 136, 17, 0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.25rem;">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--color-primary)" stroke-width="2">
                    <polyline points="3 6 5 6 21 6"/>
                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                    <line x1="10" y1="11" x2="10" y2="17"/>
                    <line x1="14" y1="11" x2="14" y2="17"/>
                </svg>
            </div>

            <h3 style="font-family: var(--font-display); font-size: 1.5rem; color: var(--color-primary); margin-bottom: 0.75rem;">
                Удаление продукта
            </h3>
            <p style="color: var(--color-text-muted); margin-bottom: 0.5rem; font-size: 0.95rem;">
                Вы уверены, что хотите удалить продукт
            </p>
            <p style="font-weight: 600; color: var(--color-primary); font-size: 1.1rem; margin-bottom: 1rem;">
                "{{ product.name }}"?
            </p>
            <p style="color: var(--color-text-muted); font-size: 0.85rem; opacity: 0.7; margin-bottom: 1.5rem;">
                Это действие нельзя будет отменить.
            </p>

            <div style="display: flex; justify-content: center; gap: 0.75rem;">
                <button type="button"
                        class="btn btn-outline"
                        style="min-width: 120px;"
                        onclick="closeModal()">
                    Отмена
                </button>
                <button type="submit"
                        class="btn"
                        style="min-width: 120px; background: var(--color-coral); color: white; display: flex; align-items: center; justify-content: center; gap: 0.5rem;"
                        onclick="closeModal()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="3 6 5 6 21 6"/>
                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                    </svg>
                    Удалить
                </button>
            </div>
        </form>
    </div>
</div>
