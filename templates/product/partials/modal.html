<!-- Универсальная модалка -->
<div id="modal"
     class="fixed inset-0 hidden items-center justify-center z-50 transition-opacity duration-300"
     style="background: rgba(255,255,255,0.3); backdrop-filter: blur(8px);">

    <div id="modal-content"
         class="transform scale-95 opacity-0 transition-all duration-300 w-full h-auto flex items-center justify-center p-4">
    </div>
</div>

<script>
    function openModal() {
        const modal = document.getElementById("modal");
        const content = document.getElementById("modal-content");

        modal.classList.remove("hidden");
        modal.classList.add("flex");
        document.body.style.overflow = 'hidden';

        setTimeout(() => {
            content.classList.remove("scale-95", "opacity-0");
            content.classList.add("scale-100", "opacity-100");
        }, 10);
    }

    function closeModal() {
        const modal = document.getElementById("modal");
        const content = document.getElementById("modal-content");

        content.classList.remove("scale-100", "opacity-100");
        content.classList.add("scale-95", "opacity-0");

        setTimeout(() => {
            modal.classList.add("hidden");
            modal.classList.remove("flex");
            document.body.style.overflow = 'auto';
        }, 300);
    }

    document.getElementById("modal").addEventListener("click", function(e) {
        if (e.target === this) {
            closeModal();
        }
    });

    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') closeModal();
    });
</script>
