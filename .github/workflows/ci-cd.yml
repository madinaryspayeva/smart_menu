name: CI-CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "dev", "main" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:

  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - name: Checkout 
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Poetry
        run: pip install poetry

      - name: Cache Poetry virtualenv
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pypoetry
            ~/.cache/pip
          key: poetry-${{ runner.os }}-py3.13-${{ hashFiles('poetry.lock') }}
          restore-keys: |
            poetry-${{ runner.os }}-py3.13-

      - name: Install dependencies
        run: poetry install --no-root --no-interaction

      - name: Lint & Security
        run: |
          poetry run ruff check .
          poetry run bandit -r . -x "**/tests/**"
          poetry run pip-audit --desc

      - name: Tests
        env:
          DATABASE_URL: ${{ secrets.DEV_DATABASE_URL }}
          REDIS_URL: ${{ secrets.DEV_REDIS_URL }}
          CSRF_TRUSTED_ORIGINS: ${{ secrets.DEV_CSRF_TRUSTED_ORIGINS }}
          SECRET_KEY: ${{ secrets.DEV_SECRET_KEY }}
          DJANGO_SETTINGS_MODULE: app.settings
        run: |
          poetry run python manage.py migrate
          poetry run pytest

  deploy:
    needs: ci
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - name: Disable COMPOSE_BAKE
        run: echo "COMPOSE_BAKE=false" >> $GITHUB_ENV

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.2.1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 20m
          script: |
            cd smart_menu
            git pull origin main
            docker compose -f docker-compose.prod.yml build --parallel
            docker compose -f docker-compose.prod.yml up -d --force-recreate
            docker compose -f docker-compose.prod.yml exec -T web find /code/staticfiles -mindepth 1 -delete 2>/dev/null || true
            docker compose -f docker-compose.prod.yml exec -T web poetry run python manage.py migrate --noinput
            docker compose -f docker-compose.prod.yml exec -T web poetry run python manage.py collectstatic --noinput
            docker compose -f docker-compose.prod.yml restart nginx
            docker compose -f docker-compose.prod.yml ps
